<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="シンプルなルーレットアプリ。候補を入力してランダムに1つ選びます。">
<meta name="theme-color" content="#ffffff">
<title>ルーレットアプリ</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --color-primary: #1a1a2e;
    --color-primary-dark: #0f0f1a;
    --color-accent: #c9a84c;
    --color-accent-dark: #b8943f;
    --color-success: #2d6a4f;
    --color-success-dark: #1b4332;
    --color-text: #1a1a2e;
    --color-text-light: #6c6c80;
    --color-bg: #fafafa;
    --color-surface: #ffffff;
    --color-border: #e8e8ec;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.1), 0 4px 12px rgba(0,0,0,.06);
    --transition-base: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes fadeScaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  @keyframes resultReveal {
    0%   { opacity: 0; transform: scale(0.8); }
    60%  { transform: scale(1.02); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes winnerGlow {
    0%, 100% { box-shadow: 0 0 16px rgba(201,168,76,.3); }
    50%      { box-shadow: 0 0 32px rgba(201,168,76,.5); }
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Meiryo', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--color-bg);
    color: var(--color-text);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ===== Screen system ===== */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 24px;
  }
  .screen[aria-hidden="false"] { display: flex; }

  /* ===== Input screen ===== */
  .title-area {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeScaleIn 0.4s ease both;
  }
  .title-area h1 {
    font-size: clamp(1.6rem, 4.5vw, 2.4rem);
    color: var(--color-text);
    font-weight: 700;
    letter-spacing: 4px;
  }
  .title-area p {
    font-size: 0.85rem;
    color: var(--color-text-light);
    margin-top: 10px;
    letter-spacing: 1px;
  }

  .input-container {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 32px;
    width: min(480px, 92vw);
    box-shadow: var(--shadow-md);
    animation: fadeScaleIn 0.4s ease 0.05s both;
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .input-row input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 1rem;
    font-family: inherit;
    background: var(--color-surface);
    color: var(--color-text);
    outline: none;
    transition: border-color var(--transition-base), box-shadow var(--transition-base);
  }
  .input-row input:focus {
    border-color: var(--color-accent);
    box-shadow: 0 0 0 3px rgba(201, 168, 76, .15);
  }
  .input-row input::placeholder { color: #aab0b7; }

  .char-count {
    text-align: right;
    font-size: 0.75rem;
    color: var(--color-text-light);
    margin-top: -8px;
    margin-bottom: 10px;
    padding-right: 4px;
  }
  .char-count.warn { color: var(--color-accent-dark); font-weight: bold; }

  .add-btn {
    padding: 12px 18px;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform var(--transition-base), box-shadow var(--transition-base);
    flex-shrink: 0;
    line-height: 1;
  }
  .add-btn:hover { transform: scale(1.04); box-shadow: var(--shadow-sm); }
  .add-btn:active { transform: scale(0.98); }

  .choices-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 14px 0;
    min-height: 40px;
  }
  .choice-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--color-surface);
    padding: 8px 14px;
    border-radius: 100px;
    font-size: 0.9rem;
    font-weight: 600;
    border: 1px solid var(--color-border);
    color: var(--color-text);
    animation: fadeScaleIn 0.25s ease both;
  }
  .choice-tag button {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--color-text-light);
    font-size: 1rem;
    padding: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: color var(--transition-base), background var(--transition-base);
  }
  .choice-tag button:hover {
    color: var(--color-primary);
    background: rgba(26, 26, 46, .06);
  }

  /* Mode tabs */
  .mode-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .mode-tab {
    flex: 1;
    padding: 10px 0;
    border: none;
    background: var(--color-surface);
    color: var(--color-text-light);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background var(--transition-base), color var(--transition-base);
  }
  .mode-tab[aria-selected="true"] {
    background: var(--color-primary);
    color: #fff;
  }
  .mode-tab + .mode-tab {
    border-left: 1px solid var(--color-border);
  }
  .mode-tab:not([aria-selected="true"]):hover {
    background: var(--color-border);
  }

  .input-mode { display: none; }
  .input-mode.active { display: block; }

  /* Bulk input */
  .bulk-textarea {
    width: 100%;
    min-height: 140px;
    padding: 12px 16px;
    border: 2px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 0.95rem;
    font-family: inherit;
    background: var(--color-surface);
    color: var(--color-text);
    outline: none;
    resize: vertical;
    line-height: 1.6;
    transition: border-color var(--transition-base), box-shadow var(--transition-base);
  }
  .bulk-textarea:focus {
    border-color: var(--color-accent);
    box-shadow: 0 0 0 3px rgba(201, 168, 76, .15);
  }
  .bulk-textarea::placeholder { color: #aab0b7; }

  .bulk-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    color: var(--color-text-light);
    margin-top: 6px;
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .bulk-info .error { color: #c0392b; font-weight: bold; }

  .bulk-apply-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: var(--color-text);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 2px;
    transition: transform var(--transition-base), box-shadow var(--transition-base), opacity var(--transition-base);
    box-shadow: var(--shadow-sm);
    margin-bottom: 4px;
  }
  .bulk-apply-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .bulk-apply-btn:disabled { opacity: 0.35; cursor: default; }

  .start-btn {
    display: block;
    width: 100%;
    padding: 16px;
    margin-top: 14px;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 4px;
    transition: transform var(--transition-base), box-shadow var(--transition-base), opacity var(--transition-base);
    box-shadow: var(--shadow-sm);
  }
  .start-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .start-btn:active:not(:disabled) { transform: translateY(0); }
  .start-btn:disabled { opacity: 0.35; cursor: default; }

  /* ===== Roulette screen ===== */
  .roulette-screen { padding: 20px; }

  .board {
    position: relative;
    width: min(640px, 92vw);
    aspect-ratio: 4 / 3;
    background: linear-gradient(180deg, #87ceeb 0%, #87ceeb 60%, #5dade2 60%, #2e86c1 100%);
    border: none;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(0,0,0,.06);
    overflow: hidden;
    animation: fadeScaleIn 0.4s ease both;
  }

  /* Map decoration */
  .map-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .map-bg .island {
    position: absolute;
    border-radius: 40%;
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    box-shadow: inset 0 -4px 8px rgba(0,0,0,.15);
  }
  .map-bg .island:nth-child(1) { width: 35%; height: 50%; top: 10%; left: 50%; border-radius: 30% 50% 40% 60%; transform: rotate(-15deg); }
  .map-bg .island:nth-child(2) { width: 15%; height: 20%; top: 55%; left: 35%; border-radius: 50% 30% 60% 40%; transform: rotate(10deg); }
  .map-bg .island:nth-child(3) { width: 20%; height: 15%; top: 65%; left: 20%; border-radius: 40% 60% 30% 50%; transform: rotate(-5deg); }
  .map-bg .island:nth-child(4) { width: 10%; height: 25%; top: 5%; left: 65%; border-radius: 50% 40% 50% 30%; transform: rotate(5deg); }
  .map-bg .cloud {
    position: absolute;
    background: rgba(255,255,255,.5);
    border-radius: 50%;
  }
  .map-bg .cloud:nth-of-type(5) { width: 60px; height: 25px; top: 12%; left: 8%; }
  .map-bg .cloud:nth-of-type(6) { width: 80px; height: 30px; top: 22%; left: 78%; }
  .map-bg .cloud:nth-of-type(7) { width: 50px; height: 20px; top: 72%; left: 5%; }

  .panel-grid {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 1px;
    background: transparent;
  }

  .panel-cell { perspective: 500px; background: transparent; }

  .panel {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    will-change: transform;
  }
  .panel .face {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.7rem, 2vw, 1.05rem);
    font-weight: 700;
    color: var(--color-text);
    backface-visibility: hidden;
    padding: 4px;
    text-align: center;
    word-break: break-all;
    line-height: 1.3;
    overflow: hidden;
    background: var(--color-surface);
  }
  .panel .back {
    transform: rotateY(180deg);
    background: transparent;
  }

  .panel.winner {
    animation: winnerGlow 1.2s ease infinite;
    z-index: 1;
    border: 2px solid var(--color-accent);
  }

  /* Controls */
  .controls {
    text-align: center;
    margin-top: 20px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 14px 36px;
    border: none;
    border-radius: var(--radius-md);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 3px;
    transition: transform var(--transition-base), box-shadow var(--transition-base), opacity var(--transition-base);
    font-family: inherit;
    color: #fff;
  }
  .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: 0.35; cursor: default; }

  .btn--stop   { background: var(--color-success); }
  .btn--retry  { background: var(--color-accent-dark); }
  .btn--back   { background: var(--color-text-light); }

  /* ===== Result overlay ===== */
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 46, .6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .result-overlay[aria-hidden="false"] { display: flex; }

  .result-box {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 48px 56px;
    text-align: center;
    animation: resultReveal 0.4s cubic-bezier(0.17, 0.67, 0.35, 1.1);
    box-shadow: 0 24px 80px rgba(0,0,0,.15), 0 8px 24px rgba(0,0,0,.08);
    max-width: 90vw;
  }
  .result-box .label {
    font-size: 0.8rem;
    color: var(--color-text-light);
    margin-bottom: 16px;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .result-box .value {
    font-size: clamp(2.2rem, 7vw, 3.6rem);
    color: var(--color-accent-dark);
    font-weight: 800;
    letter-spacing: 6px;
    animation: bounce 1.2s ease infinite;
  }
  .result-box .close-btn {
    margin-top: 28px;
    padding: 12px 40px;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform var(--transition-base), box-shadow var(--transition-base);
    font-family: inherit;
    letter-spacing: 3px;
  }
  .result-box .close-btn:hover { transform: scale(1.03); box-shadow: var(--shadow-md); }

  /* ===== Responsive ===== */
  @media (max-width: 480px) {
    .input-container { padding: 18px; }
    .board { border-radius: var(--radius-md); }
    .panel .face { font-size: 0.65rem; }
    .controls { gap: 8px; }
    .btn { padding: 12px 24px; font-size: 1rem; }
    .result-box { padding: 32px 24px; }
  }
</style>
</head>
<body>

<!-- ===== Input screen ===== -->
<div id="inputScreen" class="screen" aria-hidden="false">
  <div class="title-area">
    <h1>ルーレットアプリ</h1>
    <p>候補を入力して、ルーレットで決めよう</p>
  </div>
  <div class="input-container">
    <div class="mode-tabs" role="tablist">
      <button class="mode-tab" id="tabSingle" role="tab" aria-selected="true" aria-controls="modeSingle">1件ずつ入力</button>
      <button class="mode-tab" id="tabBulk" role="tab" aria-selected="false" aria-controls="modeBulk">一括入力</button>
    </div>

    <div class="input-mode active" id="modeSingle" role="tabpanel">
      <div class="input-row">
        <input type="text" id="choiceInput" placeholder="候補を入力（6文字まで）" maxlength="6" aria-label="候補の入力">
        <button class="add-btn" id="addBtn" aria-label="候補を追加">+</button>
      </div>
      <div class="char-count" id="charCount">0 / 6</div>
    </div>

    <div class="input-mode" id="modeBulk" role="tabpanel">
      <textarea class="bulk-textarea" id="bulkInput" placeholder="1行に1つずつ入力（6文字/行、最大25行）&#10;例:&#10;長野&#10;仙台&#10;日光" aria-label="一括入力"></textarea>
      <div class="bulk-info">
        <span id="bulkCount">0 / 25 行</span>
        <span id="bulkError"></span>
      </div>
      <button class="bulk-apply-btn" id="bulkApplyBtn" disabled>候補に反映</button>
    </div>

    <div class="choices-list" id="choicesList" role="list"></div>
    <button class="start-btn" id="startBtn" disabled>スタート</button>
  </div>
</div>

<!-- ===== Roulette screen ===== -->
<div id="rouletteScreen" class="screen" aria-hidden="true">
  <div class="board">
    <div class="map-bg">
      <div class="island"></div>
      <div class="island"></div>
      <div class="island"></div>
      <div class="island"></div>
      <div class="cloud"></div>
      <div class="cloud"></div>
      <div class="cloud"></div>
    </div>
    <div class="panel-grid" id="grid"></div>
  </div>
  <div class="controls">
    <button class="btn btn--stop" id="stopBtn">ストップ</button>
    <button class="btn btn--retry" id="retryBtn" hidden>もう一回</button>
    <button class="btn btn--back" id="backBtn">もどる</button>
  </div>
</div>

<!-- ===== Result overlay ===== -->
<div class="result-overlay" id="resultOverlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="結果">
  <div class="result-box">
    <div class="label">結果発表</div>
    <div class="value" id="resultValue" aria-live="assertive"></div>
    <button class="close-btn" id="closeResult">OK</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ===== Constants =====
  var PANEL_COUNT = 16;
  var MAX_CHOICES = 25;
  var MAX_CHAR = 6;
  var MAX_FACE_UP = 3;
  var FLIP_DURATION = 450; // ms

  // ===== State =====
  var state = {
    choices: [],
    panels: [],
    isStopping: false,
    animFrameId: null,
    lastFlipTime: 0,
    faceUpSet: new Set(),
  };

  // ===== DOM refs (cached once) =====
  var dom = {
    inputScreen:   document.getElementById('inputScreen'),
    rouletteScreen: document.getElementById('rouletteScreen'),
    choiceInput:   document.getElementById('choiceInput'),
    charCount:     document.getElementById('charCount'),
    choicesList:   document.getElementById('choicesList'),
    startBtn:      document.getElementById('startBtn'),
    addBtn:        document.getElementById('addBtn'),
    grid:          document.getElementById('grid'),
    stopBtn:       document.getElementById('stopBtn'),
    retryBtn:      document.getElementById('retryBtn'),
    backBtn:       document.getElementById('backBtn'),
    resultOverlay: document.getElementById('resultOverlay'),
    resultValue:   document.getElementById('resultValue'),
    closeResult:   document.getElementById('closeResult'),
    tabSingle:     document.getElementById('tabSingle'),
    tabBulk:       document.getElementById('tabBulk'),
    modeSingle:    document.getElementById('modeSingle'),
    modeBulk:      document.getElementById('modeBulk'),
    bulkInput:     document.getElementById('bulkInput'),
    bulkCount:     document.getElementById('bulkCount'),
    bulkError:     document.getElementById('bulkError'),
    bulkApplyBtn:  document.getElementById('bulkApplyBtn'),
  };

  // ===== Utilities =====
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = (Math.random() * (i + 1)) | 0;
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
  }

  function randomChoice() {
    return state.choices[(Math.random() * state.choices.length) | 0];
  }

  // ===== Screen navigation =====
  function showScreen(screenEl) {
    document.querySelectorAll('.screen').forEach(function (s) {
      s.setAttribute('aria-hidden', 'true');
    });
    screenEl.setAttribute('aria-hidden', 'false');
  }

  // ===== Choices management =====
  function addChoice() {
    var v = dom.choiceInput.value.trim();
    if (!v || v.length > MAX_CHAR || state.choices.length >= MAX_CHOICES) return;
    if (state.choices.indexOf(v) !== -1) return;
    state.choices.push(v);
    dom.choiceInput.value = '';
    updateCharCount();
    appendChoiceTag(v, state.choices.length - 1);
    updateStartBtn();
    dom.choiceInput.focus();
  }

  function removeChoice(index) {
    state.choices.splice(index, 1);
    renderAllChoices();
    updateStartBtn();
  }

  function appendChoiceTag(text, index) {
    var tag = document.createElement('div');
    tag.className = 'choice-tag';
    tag.setAttribute('role', 'listitem');
    tag.dataset.index = index;

    var span = document.createElement('span');
    span.textContent = text;

    var btn = document.createElement('button');
    btn.setAttribute('aria-label', text + 'を削除');
    btn.textContent = '\u2715';

    tag.appendChild(span);
    tag.appendChild(btn);
    dom.choicesList.appendChild(tag);
  }

  function renderAllChoices() {
    dom.choicesList.textContent = '';
    state.choices.forEach(function (c, i) {
      appendChoiceTag(c, i);
    });
  }

  function updateStartBtn() {
    dom.startBtn.disabled = state.choices.length < 2;
  }

  function updateCharCount() {
    var len = dom.choiceInput.value.length;
    dom.charCount.textContent = len + ' / ' + MAX_CHAR;
    dom.charCount.classList.toggle('warn', len >= MAX_CHAR);
  }

  // ===== Event delegation for choice removal =====
  dom.choicesList.addEventListener('click', function (e) {
    var btn = e.target.closest('.choice-tag button');
    if (!btn) return;
    var tag = btn.closest('.choice-tag');
    var index = Array.prototype.indexOf.call(dom.choicesList.children, tag);
    if (index >= 0) removeChoice(index);
  });

  dom.addBtn.addEventListener('click', addChoice);
  dom.choiceInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') addChoice();
  });
  dom.choiceInput.addEventListener('input', updateCharCount);

  // ===== Tab switching =====
  function switchTab(tab) {
    var isSingle = tab === 'single';
    dom.tabSingle.setAttribute('aria-selected', isSingle ? 'true' : 'false');
    dom.tabBulk.setAttribute('aria-selected', isSingle ? 'false' : 'true');
    dom.modeSingle.classList.toggle('active', isSingle);
    dom.modeBulk.classList.toggle('active', !isSingle);
  }

  dom.tabSingle.addEventListener('click', function () { switchTab('single'); });
  dom.tabBulk.addEventListener('click', function () { switchTab('bulk'); });

  // ===== Bulk input =====
  function parseBulkLines() {
    var raw = dom.bulkInput.value;
    var lines = raw.split('\n');
    var valid = [];
    var errors = [];

    for (var i = 0; i < lines.length; i++) {
      var trimmed = lines[i].trim();
      if (!trimmed) continue;
      if (valid.length >= MAX_CHOICES) break;
      if (trimmed.length > MAX_CHAR) {
        errors.push((i + 1) + '行目: 「' + trimmed + '」は' + MAX_CHAR + '文字超');
      } else if (valid.indexOf(trimmed) !== -1) {
        // skip duplicates silently
      } else {
        valid.push(trimmed);
      }
    }
    return { valid: valid, errors: errors };
  }

  function updateBulkInfo() {
    var result = parseBulkLines();
    dom.bulkCount.textContent = result.valid.length + ' / ' + MAX_CHOICES + ' 行';
    if (result.errors.length > 0) {
      dom.bulkError.className = 'error';
      dom.bulkError.textContent = result.errors[0] + (result.errors.length > 1 ? '  他' + (result.errors.length - 1) + '件' : '');
    } else {
      dom.bulkError.className = '';
      dom.bulkError.textContent = '';
    }
    dom.bulkApplyBtn.disabled = result.valid.length === 0 || result.errors.length > 0;
  }

  dom.bulkInput.addEventListener('input', updateBulkInfo);

  dom.bulkApplyBtn.addEventListener('click', function () {
    var result = parseBulkLines();
    if (result.errors.length > 0 || result.valid.length === 0) return;
    state.choices = result.valid;
    renderAllChoices();
    updateStartBtn();
  });

  dom.startBtn.addEventListener('click', function () {
    if (state.choices.length < 2) return;
    showScreen(dom.rouletteScreen);
    initRoulette();
  });

  dom.backBtn.addEventListener('click', function () {
    stopAnimation();
    showScreen(dom.inputScreen);
    dom.resultOverlay.setAttribute('aria-hidden', 'true');
    dom.retryBtn.hidden = true;
    dom.stopBtn.hidden = false;
    dom.stopBtn.disabled = false;
  });

  dom.retryBtn.addEventListener('click', function () {
    dom.retryBtn.hidden = true;
    dom.stopBtn.hidden = false;
    dom.stopBtn.disabled = false;
    dom.resultOverlay.setAttribute('aria-hidden', 'true');
    initRoulette();
  });

  dom.closeResult.addEventListener('click', function () {
    dom.resultOverlay.setAttribute('aria-hidden', 'true');
  });

  // ===== Roulette logic =====
  function buildGrid() {
    var frag = document.createDocumentFragment();
    var assigned = [];
    for (var i = 0; i < PANEL_COUNT; i++) {
      assigned.push(state.choices[i % state.choices.length]);
    }
    shuffle(assigned);

    state.panels = [];

    for (var i = 0; i < PANEL_COUNT; i++) {
      var cell = document.createElement('div');
      cell.className = 'panel-cell';

      var panel = document.createElement('div');
      panel.className = 'panel';

      var front = document.createElement('div');
      front.className = 'face front';
      front.textContent = assigned[i];

      var back = document.createElement('div');
      back.className = 'face back';

      panel.appendChild(front);
      panel.appendChild(back);
      cell.appendChild(panel);
      frag.appendChild(cell);

      // Start face-down
      panel.style.transform = 'rotateY(180deg)';

      state.panels.push({
        el: panel,
        front: front,
        finalChoice: assigned[i],
        stopped: false,
      });
    }

    dom.grid.textContent = '';
    dom.grid.appendChild(frag);
  }

  function initRoulette() {
    stopAnimation();
    state.isStopping = false;
    state.faceUpSet.clear();
    state.lastFlipTime = 0;
    buildGrid();
    state.animFrameId = requestAnimationFrame(animationLoop);
  }

  function animationLoop(timestamp) {
    if (state.isStopping) return;

    if (timestamp - state.lastFlipTime >= 350) {
      state.lastFlipTime = timestamp;
      flipStep();
    }
    state.animFrameId = requestAnimationFrame(animationLoop);
  }

  function flipStep() {
    var faceUp = state.faceUpSet;
    var panels = state.panels;

    // Flip some face-up panels back down
    var toRemove = [];
    faceUp.forEach(function (idx) {
      if (Math.random() < 0.35) {
        var p = panels[idx];
        p.el.style.transition = 'transform ' + FLIP_DURATION + 'ms cubic-bezier(0.4, 0, 0.2, 1)';
        p.el.style.transform = 'rotateY(180deg)';
        // Update text mid-flip
        setTimeout(function () {
          p.front.textContent = randomChoice();
        }, FLIP_DURATION / 2);
        toRemove.push(idx);
      }
    });
    toRemove.forEach(function (idx) { faceUp.delete(idx); });

    // Flip new panels face-up
    var candidates = [];
    for (var i = 0; i < PANEL_COUNT; i++) {
      if (!faceUp.has(i) && !panels[i].stopped) candidates.push(i);
    }
    shuffle(candidates);

    while (faceUp.size < MAX_FACE_UP && candidates.length > 0) {
      var idx = candidates.pop();
      var p = panels[idx];
      p.front.textContent = randomChoice();
      p.el.style.transition = 'transform ' + FLIP_DURATION + 'ms cubic-bezier(0.4, 0, 0.2, 1)';
      p.el.style.transform = 'rotateY(0deg)';
      faceUp.add(idx);
    }
  }

  function stopAnimation() {
    if (state.animFrameId) {
      cancelAnimationFrame(state.animFrameId);
      state.animFrameId = null;
    }
  }

  dom.stopBtn.addEventListener('click', function () {
    if (state.isStopping) return;
    state.isStopping = true;
    dom.stopBtn.disabled = true;
    stopAnimation();

    var winnerIdx = (Math.random() * PANEL_COUNT) | 0;
    var winner = state.panels[winnerIdx];

    // All panels face-down
    state.panels.forEach(function (p) {
      p.stopped = true;
      p.el.style.transition = 'transform 500ms cubic-bezier(0.4, 0, 0.2, 1)';
      p.el.style.transform = 'rotateY(180deg)';
    });

    // Reveal winner after a pause
    setTimeout(function () {
      winner.front.textContent = winner.finalChoice;
      winner.el.style.transition = 'transform 600ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      winner.el.style.transform = 'rotateY(0deg)';

      setTimeout(function () {
        winner.el.classList.add('winner');
        showResult(winner.finalChoice);
      }, 650);
    }, 550);
  });

  function showResult(text) {
    dom.resultValue.textContent = text;
    dom.resultOverlay.setAttribute('aria-hidden', 'false');
    dom.stopBtn.hidden = true;
    dom.retryBtn.hidden = false;
    dom.closeResult.focus();
  }
})();
</script>
</body>
</html>
